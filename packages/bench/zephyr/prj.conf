# Minimal Zephyr configuration for the benchmark
# You may adjust heap and stack sizes as needed.

# Ensure sufficient heap for dynamic allocations
CONFIG_HEAP_MEM_POOL_SIZE=16384

# Main thread stack size (not used directly, but safe)
CONFIG_MAIN_STACK_SIZE=16384

# Enable DWT cycle counter on Cortex-M (if available)
CONFIG_ARMV7_M_DWT=y
