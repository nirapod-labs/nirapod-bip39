name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install workspace dependencies
        run: bun install

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Verify tagged release
        run: bun run verify

      - name: Verify component version
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          MANIFEST_VERSION=$(grep '^version:' packages/core/idf_component.yml | awk '{print $2}' | tr -d '"')
          echo "Tag version: $TAG_VERSION"
          echo "Manifest version: $MANIFEST_VERSION"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match manifest version ($MANIFEST_VERSION) in packages/core/idf_component.yml"
            exit 1
          fi

      - name: Read release metadata
        id: meta
        run: |
          NOTES=".github/releases/${{ github.ref_name }}.md"
          if [ -f "$NOTES" ]; then
            TITLE=$(head -1 "$NOTES" | sed 's/^# //')
            tail -n +3 "$NOTES" > /tmp/release_body.md
            echo "title=$TITLE" >> $GITHUB_OUTPUT
            echo "has_notes=true" >> $GITHUB_OUTPUT
          else
            echo "title=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "has_notes=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish release (custom notes)
        if: steps.meta.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.meta.outputs.title }}
          body_path: /tmp/release_body.md

      - name: Publish release (auto-generated notes)
        if: steps.meta.outputs.has_notes == 'false'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  publish-idf-component:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Upload to ESP-IDF Component Registry
        uses: espressif/upload-components-ci-action@v2
        with:
          components: "nirapod-bip39:packages/core"
          namespace: nirapod
          version: ${{ github.ref_name }}
          api_token: ${{ secrets.IDF_COMPONENT_API_TOKEN }}
