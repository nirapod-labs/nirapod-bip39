name: Audit

on:
  push:
    branches:
      - main
      - release/**
  pull_request:

jobs:
  nirapod-audit:
    name: Nirapod Security & Compliance Audit
    uses: nirapod-labs/nirapod-audit/.github/workflows/reusable-audit.yml@a701755bee920537b5f31d5817a14ab1d9ae2a4e
    permissions:
      contents: read
      issues: write
      pull-requests: write
      security-events: write
      statuses: write
    with:
      working_directory: packages/core
      tool_ref: a701755bee920537b5f31d5817a14ab1d9ae2a4e
