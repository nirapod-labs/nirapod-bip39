name: Audit

on:
  push:
    branches:
      - main
      - release/**
  pull_request:

jobs:
  nirapod-audit:
    name: Nirapod Security & Compliance Audit
    uses: nirapod-labs/nirapod-audit/.github/workflows/reusable-audit.yml@26ba32941792a4aab9cfc04c717f65ad868857b4
    permissions:
      contents: read
      issues: write
      pull-requests: write
      security-events: write
      statuses: write
    with:
      working_directory: packages/core
