name: Audit

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  nirapod-audit:
    name: Nirapod Security & Compliance Audit
    uses: nirapod-labs/nirapod-audit/.github/workflows/reusable-audit.yml@main
    permissions:
      contents: read
      pull-requests: write
      security-events: write
